<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IonShield · Simulation Mode</title>
  <link rel="stylesheet" href="/static/marketing.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
  <style>
    body { margin: 0; background: #0a0e1a; color: #e2e8f0;
           font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif; }
    .sim-wrap { display: grid; grid-template-rows: auto auto 1fr auto;
                height: 100vh; max-height: 100vh; }
    header.sim {
      padding: 14px 20px; background: #0f172a; border-bottom: 1px solid #1e293b;
      display: flex; justify-content: space-between; align-items: center;
    }
    header.sim h1 {
      margin: 0; font-size: 18px; font-weight: 800; letter-spacing: 2px;
      color: #38bdf8;
    }
    header.sim a {
      color: #94a3b8; text-decoration: none; font-size: 13px; margin-left: 16px;
    }
    header.sim a:hover { color: #e2e8f0; }
    .scenario-bar {
      display: flex; gap: 10px; padding: 12px 20px; background: #0c1729;
      border-bottom: 1px solid #1e293b; overflow-x: auto;
    }
    .scenario-card {
      flex: 0 0 auto; padding: 10px 14px; border-radius: 8px;
      background: #0f172a; border: 1px solid #1e293b; cursor: pointer;
      min-width: 240px; transition: border-color .2s;
    }
    .scenario-card:hover { border-color: #38bdf8; }
    .scenario-card.active { border-color: #38bdf8; box-shadow: 0 0 0 1px #38bdf8 inset; }
    .scenario-card .title { font-weight: 700; font-size: 13px; color: #e2e8f0; }
    .scenario-card .tagline { font-size: 11px; color: #64748b; margin-top: 4px; }
    .scenario-card .tags { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
    .tag { padding: 1px 6px; border-radius: 3px; font-size: 9px; font-weight: 700;
           background: #1e293b; color: #94a3b8; text-transform: uppercase;
           letter-spacing: .5px; }
    .tag.live { background: #22c55e; color: #052e16; }
    .tag.g5 { background: #ef4444; color: white; }
    .tag.g4 { background: #f59e0b; color: #451a03; }

    .sim-main { display: grid; grid-template-columns: 1fr 360px; min-height: 0; }
    #map { height: 100%; }
    aside.detail {
      background: #0f172a; border-left: 1px solid #1e293b; padding: 16px;
      overflow-y: auto;
    }
    aside.detail h2 {
      margin: 0 0 8px 0; font-size: 14px; font-weight: 700; color: #38bdf8;
      text-transform: uppercase; letter-spacing: 1.5px;
    }
    aside.detail .summary {
      font-size: 13px; color: #94a3b8; line-height: 1.5; margin-bottom: 14px;
    }
    aside.detail .video-slot {
      background: #0a0e1a; border: 1px dashed #1e293b; border-radius: 6px;
      aspect-ratio: 16 / 9; display: flex; align-items: center;
      justify-content: center; color: #64748b; font-size: 11px;
      text-align: center; padding: 0 12px; margin-bottom: 14px;
    }
    aside.detail video { width: 100%; border-radius: 6px; margin-bottom: 14px; }
    .downloads { display: flex; }
    .dl-btn {
      flex: 1; min-width: 100px;
      padding: 6px 10px; border-radius: 6px;
      background: #1e293b; color: #38bdf8; text-decoration: none;
      font-size: 11px; font-weight: 700; letter-spacing: .5px;
      text-align: center; border: 1px solid #1e293b; transition: border-color .15s;
    }
    .dl-btn:hover { border-color: #38bdf8; background: #0f172a; }
    .stat-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px;
    }
    .stat {
      background: #0a0e1a; border: 1px solid #1e293b; border-radius: 6px;
      padding: 8px 10px;
    }
    .stat-label { font-size: 9px; color: #64748b; text-transform: uppercase;
                  letter-spacing: 1px; }
    .stat-val { font-size: 18px; font-weight: 700; color: #e2e8f0; margin-top: 3px; }
    .v-green { color: #22c55e; } .v-amber { color: #f59e0b; } .v-red { color: #ef4444; }

    footer.controls {
      padding: 12px 20px; background: #0c1729; border-top: 1px solid #1e293b;
      display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center;
    }
    footer button {
      background: #38bdf8; color: #0a0e1a; border: 0; padding: 8px 14px;
      border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 12px;
    }
    footer button:disabled { background: #1e293b; color: #475569; cursor: default; }
    footer input[type=range] { width: 100%; }
    footer .time-label {
      font-family: ui-monospace, monospace; font-size: 12px; color: #94a3b8;
      min-width: 220px; text-align: right;
    }
    .loader {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: #94a3b8; font-size: 12px;
    }

    .leaflet-container { background: #0a0e1a; }
    .leaflet-tile-pane { filter: invert(1) hue-rotate(180deg) brightness(.85) contrast(.95); }

    /* ── Severity legend (map overlay) ─────────────────────────────────── */
    .sim-legend {
      background: rgba(15,23,42,0.92); border: 1px solid #1e293b;
      border-radius: 6px; padding: 10px 12px; color: #e2e8f0;
      font-size: 11px; line-height: 1.5; min-width: 170px;
      backdrop-filter: blur(6px);
    }
    .sim-legend-row { display: flex; align-items: center; gap: 8px; margin: 2px 0; }
    .sim-legend-row span {
      display: inline-block; width: 14px; height: 14px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.12);
    }

    /* ── Storm-phase pill (right panel) ────────────────────────────────── */
    .phase-pill {
      display: inline-block; padding: 4px 10px; border-radius: 14px;
      font-size: 10px; font-weight: 800; letter-spacing: 1px;
      margin-bottom: 12px;
    }
    .phase-pill.phase-initial  { background: rgba(56,189,248,0.15); color: #38bdf8; }
    .phase-pill.phase-main     { background: rgba(239,68,68,0.18);  color: #ef4444; }
    .phase-pill.phase-recovery { background: rgba(34,197,94,0.15);  color: #22c55e; }

    /* ── Region drill-in card ──────────────────────────────────────────── */
    #region-detail {
      background: #0a0e1a; border: 1px solid #1e293b; border-radius: 8px;
      padding: 12px; margin-bottom: 14px;
    }

    /* ── Export dropdown ───────────────────────────────────────────────── */
    .export-wrap { position: relative; margin-bottom: 14px; }
    .export-btn {
      width: 100%; padding: 9px 12px; border-radius: 6px;
      background: #0a0e1a; border: 1px solid #1e293b; color: #e2e8f0;
      font-size: 12px; font-weight: 600; cursor: pointer; text-align: left;
      display: flex; justify-content: space-between; align-items: center;
    }
    .export-btn:hover { border-color: #38bdf8; }
    .export-menu {
      display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #0f172a; border: 1px solid #1e293b; border-radius: 6px;
      z-index: 50; overflow: hidden;
    }
    .export-wrap.open .export-menu { display: block; }
    .export-item {
      display: block; padding: 9px 12px; color: #e2e8f0;
      text-decoration: none; border-bottom: 1px solid #1e293b; font-size: 12px;
    }
    .export-item:last-child { border-bottom: 0; }
    .export-item:hover { background: #1e293b; }
    .export-item div { font-size: 10px; color: #64748b; margin-top: 2px; font-weight: 400; }
  </style>
</head>
<body>
  <div class="sim-wrap">
    <header class="sim">
      <h1 id="sim-title">⚡ IONSHIELD · SIMULATION MODE</h1>
      <nav style="display:flex;align-items:center;gap:14px;">
        <select id="customer-picker" title="Switch audience profile"
                style="background:#0f172a; color:#e2e8f0; border:1px solid #1e293b;
                       padding:6px 10px; border-radius:6px; font-size:12px;">
          <option value="">All audiences (default)</option>
        </select>
        <a href="/simulation"
           style="color:#94a3b8;text-decoration:none;font-size:12px;">
          ← Simulation overview
        </a>
        <a href="/dashboard"
           style="background:#38bdf8;color:#0a0e1a;padding:6px 12px;border-radius:6px;
                  text-decoration:none;font-weight:700;font-size:12px;">
          Live Dashboard
        </a>
      </nav>
    </header>

    <section class="scenario-bar" id="scenario-bar">
      <span style="color:#64748b; font-size:11px; align-self:center;">Loading scenarios…</span>
    </section>

    <section class="sim-main">
      <div id="map"></div>
      <aside class="detail">
        <h2 id="detail-title">Loading scenario…</h2>
        <span class="phase-pill phase-initial" id="storm-phase">—</span>
        <p class="summary" id="detail-summary"></p>
        <div class="video-slot" id="video-slot" style="display:none;"></div>

        <!-- Region drill-in: populated when a user clicks a region on the map -->
        <div id="region-detail">
          <div style="font-size:11px;color:#64748b;">
            Click any region on the map to pin it and see per-system impact.
          </div>
        </div>

        <!-- Whole-frame max stats (the "what's the worst it gets" snapshot) -->
        <div class="stat-row">
          <div class="stat"><div class="stat-label">Kp</div>
            <div class="stat-val" id="stat-kp">—</div></div>
          <div class="stat"><div class="stat-label">GPS L1 max (m)</div>
            <div class="stat-val" id="stat-gps">—</div></div>
          <div class="stat"><div class="stat-label">HF max (dB)</div>
            <div class="stat-val" id="stat-hf">—</div></div>
          <div class="stat"><div class="stat-label">SATCOM L peak (dB)</div>
            <div class="stat-val" id="stat-sat">—</div></div>
        </div>

        <!-- Export dropdown: collapses KMZ / CSV / GeoJSON behind one menu -->
        <div class="export-wrap" id="export-wrap" style="display:none;">
          <button class="export-btn" id="export-btn"
                  onclick="this.parentElement.classList.toggle('open')">
            <span>↓ Export for analysts</span>
            <span style="font-size:10px;color:#64748b;">▾</span>
          </button>
          <div class="export-menu" id="export-menu"></div>
        </div>

        <div id="highlights"></div>
      </aside>
    </section>

    <footer class="controls">
      <button id="play-btn" disabled>▶ Play</button>
      <input type="range" id="time-slider" min="0" max="0" value="0" disabled />
      <span class="time-label" id="time-label">—</span>
    </footer>
  </div>

  <div class="loader" id="loader" style="display:none">Loading scenario data…</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
          crossorigin=""></script>
  <script src="/static/simulation.js"></script>
</body>
</html>
