# Render deployment configuration — https://render.com/docs/blueprint-spec
#
# Deploy steps:
#   1. Push this repo to GitHub
#   2. In Render dashboard → New → Blueprint → connect your repo
#   3. Set the SECRET env vars below (API_KEY, SMTP_*, etc.) in the dashboard
#      — never put real secrets in this file
#   4. Render builds the Docker image and deploys automatically on every push
#
# Architecture:
#   • Single "web" service: FastAPI + static frontend (React/CesiumJS)
#   • SQLite archive stored on a 1 GB persistent disk
#   • NOAA data fetched every 5 min from within the container (no external worker)

services:
  - type: web
    name: ionshield
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter            # upgrade to standard for always-on + more RAM
    region: oregon           # pick the region closest to your users

    healthCheckPath: /api/status

    # Render injects PORT automatically; the Dockerfile CMD reads $PORT
    envVars:
      # ── App ──────────────────────────────────────────────────────────────────
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "*"            # lock to your domain after go-live
      - key: RATE_LIMIT
        value: "120/minute"
      - key: CONTACT_RATE_LIMIT
        value: "5/hour"       # tighter in production

      # ── Space-weather feeds ──────────────────────────────────────────────────
      # NASA api.nasa.gov key for the DONKI event feed. DEMO_KEY is rate-limited
      # (http_429); paste your real key in the Render dashboard. All other feeds
      # (D-RAP, NAVCEN GPS almanac, OVATION, WMM) need no key.
      - key: NASA_API_KEY
        sync: false           # set manually in Render dashboard — never commit

      # ── Database (SQLite on persistent disk, mounted at /data) ───────────────
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////data/ionshield.db

      # ── Auth (set a strong random value in the Render dashboard) ─────────────
      - key: API_KEY
        sync: false           # set manually in Render dashboard — never commit
      # Phase 1: bootstrap secret for /api/v3/admin/keys (mint per-tenant keys)
      - key: ADMIN_BEARER
        sync: false

      # ── Email / contact form (all optional — leave blank to disable) ─────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CONTACT_TO_EMAIL
        value: pilots@ionshield.io

      # ── ATAK CoT push (optional) ─────────────────────────────────────────────
      - key: COT_SERVER_HOST
        sync: false

      # ── Foundry data sync (A1+A2+A3 — pushes to ionshield.usw-16.palantirfoundry.com) ─
      # All four datasets must exist on the stack. RIDs are not secret;
      # the bearer token is — set FOUNDRY_TOKEN in the Render dashboard only.
      - key: FOUNDRY_SYNC_ENABLED
        value: "true"
      - key: FOUNDRY_STACK_URL
        value: https://ionshield.usw-16.palantirfoundry.com
      - key: FOUNDRY_TOKEN
        sync: false           # paste the bearer token in Render dashboard
      - key: FOUNDRY_SPACE_WEATHER_RAW_RID
        value: ri.foundry.main.dataset.61803d11-27c4-4de4-a353-0a7efe59430b
      - key: FOUNDRY_LOCATION_RISK_RID
        value: ri.foundry.main.dataset.1e4f9d47-ff27-417a-a9dd-f40fd78d65bf
      - key: FOUNDRY_EVENTS_RID
        value: ri.foundry.main.dataset.2921a258-20d9-4667-a98d-214099323b72
      - key: FOUNDRY_IMPACT_RID
        value: ri.foundry.main.dataset.b1a1616b-aaa9-4dec-9636-b4801c7eb02f

    # Persistent disk keeps the SQLite archive across deploys.
    # Requires at least the "starter" plan ($7/mo).
    # Remove this block if you switch to Postgres (free tier has no disk).
    disk:
      name: ionshield-data
      mountPath: /data
      sizeGB: 1
