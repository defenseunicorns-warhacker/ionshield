services:
  api:
    build: .
    ports:
      - "8000:8000"
    # Load secrets from .env — file is never baked into the image
    env_file:
      - path: .env
        required: false   # allow startup without a .env (falls back to defaults)
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s   # give the initial NOAA fetch time to complete
