name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref (saves minutes on rapid pushes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install --quiet ruff==0.8.6

      - name: ruff check
        run: ruff check .

      - name: ruff format (check only)
        run: ruff format --check .

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          # Sanity check — fail loudly if numpy/pyarrow didn't land.
          python -c "import numpy, pyarrow; print('numpy', numpy.__version__, 'pyarrow', pyarrow.__version__)"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Frontend: unit tests + Vite build ─────────────────────────────────────
  frontend:
    name: Frontend (Vitest + Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm test -- --reporter=verbose

      - name: Production build
        run: npm run build
        env:
          VITE_CESIUM_TOKEN: ""   # OSM fallback in CI — expected

      - name: Assert build output
        run: |
          test -f ../app/static/index.html || (echo "❌ index.html missing" && exit 1)
          test -d ../app/static/cesium     || (echo "❌ cesium/ missing — post-build failed" && exit 1)
          test -d ../app/static/assets     || (echo "❌ assets/ missing" && exit 1)
          echo "✓ Build output verified"

  # ── SEO / marketing pages sanity check ────────────────────────────────────
  marketing-pages:
    name: Marketing pages exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all pages present
        run: |
          for page in index features demo use-cases docs pricing compliance; do
            test -f app/pages/${page}.html || (echo "❌ Missing: app/pages/${page}.html" && exit 1)
          done
          echo "✓ All 7 marketing pages present"

  # ── Docker build (verify image compiles on every push) ────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ionshield:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Publish to GHCR (main branch only) ───────────────────────────────────
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
