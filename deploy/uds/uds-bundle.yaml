# UDS Bundle: IonShield, deployable with uds-cli.
#
# NOTE: UDS Core is deployed separately — it ships as its own bundle and
# bundles cannot nest bundles. The full local demo is two commands:
#
#   # 1. Stand up a local k3d cluster with UDS Core slim (Istio + Pepr):
#   uds deploy k3d-core-slim-dev:1.6.0 --confirm
#
#   # 2. Build + deploy IonShield into it (from deploy/zarf):
#   zarf package create . --confirm
#   zarf package deploy zarf-package-ionshield-*.tar.zst --confirm
#
#   # → https://ionshield.uds.dev
#
# This bundle file wraps the IonShield package for uds-cli workflows
# (uds create / uds deploy), useful when delivering IonShield alongside
# other mission apps as a single artifact:
#
#   cd deploy/uds
#   uds create . --confirm
#   uds deploy uds-bundle-ionshield-*.tar.zst --confirm
kind: UDSBundle
metadata:
  name: ionshield
  description: "IonShield — space weather operational intelligence on UDS"
  version: 0.1.0

packages:
  - name: ionshield
    # Path to the created zarf package tarball, relative to this file:
    path: ../zarf
    ref: 0.1.0
